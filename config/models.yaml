# Model Configuration for Agentic GraphRAG
# Uses OpenRouter for unified multi-provider access
# Update these as new models are released

# ============================================================================
# OpenRouter Models (via https://openrouter.ai)
# ============================================================================
# OpenRouter provides unified access to all major LLM providers
# Set OPENROUTER_API_KEY in .env to use any model below

openrouter:
  # Default models by tier
  chat:
    general: google/gemini-2.5-flash-lite           # Fast, cost-effective
    strong: google/gemini-2.5-flash                 # High capability
    reason: google/gemini-2.5-flash                 # Reasoning tasks

  embedding:
    default: google/gemini-embedding-001  # 3072 dimensions
    small: openai/text-embedding-3-small    # 1536 dimensions

# ============================================================================
# Provider-Specific Models (for direct API access)
# ============================================================================

openai:
  chat:
    general: gpt-4o-mini
    strong: gpt-4o
    reason: o3-mini
  embedding:
    default: text-embedding-3-large
    small: text-embedding-3-small

anthropic:
  chat:
    general: claude-3-haiku-20240307
    strong: claude-3-5-sonnet-20241022
    reason: claude-3-5-sonnet-20241022

google:
  chat:
    general: gemini-2.5-flash
    strong: gemini-2.5-pro
    reason: gemini-2.5-pro

groq:
  chat:
    general: llama-3.1-8b-instant
    strong: llama-3.1-70b-versatile
    reason: deepseek-r1-distill-llama-70b

deepseek:
  chat:
    general: deepseek-chat
    strong: deepseek-chat
    reason: deepseek-reasoner

# ============================================